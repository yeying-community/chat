name: Release App

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-macos-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust 1.86.0
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-release

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run app:build:release

      - name: Generate updater manifest
        if: github.event_name == 'release'
        run: |
          node ./scripts/generate-updater-manifest.mjs \
            --repo "${{ github.repository }}" \
            --tag "${{ github.event.release.tag_name }}" \
            --pub-date "${{ github.event.release.published_at }}"

      - name: Upload workflow package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop-release
          path: |
            src-tauri/target/release/bundle/macos/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

      - name: Upload updater manifest artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: macos-updater-manifest
          path: src-tauri/target/release/bundle/macos/latest.json
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            src-tauri/target/release/bundle/macos/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/macos/latest.json
